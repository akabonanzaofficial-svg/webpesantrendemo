<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Pesantren Al-Hikmah</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <!-- Kontainer Peta -->
    <div id="map-container" class="w-full h-96 overflow-hidden rounded-xl shadow-lg mb-8 hidden">
        <iframe id="map-iframe" class="w-full h-full border-0" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>

    <script>
        // Simulasi objek config (Pastikan data ini diisi dari hasil fetch API Anda)
        // Jika Anda memiliki variabel global lain, pastikan namanya sesuai
        const config = window.appData || {}; 

        // Logika Parser Cerdas yang sudah diperbarui untuk mendukung pihak ketiga
        const mapContainer = document.getElementById('map-container');
        const mapIframe = document.getElementById('map-iframe');
        
        if (mapContainer && mapIframe) {
            if (config.MapUrl && config.MapUrl.trim() !== "") {
                let finalMapUrl = config.MapUrl.trim();
                
                // Ambil src jika user memasukkan kode iframe
                const iframeMatch = finalMapUrl.match(/src="([^"]+)"/);
                if (iframeMatch && iframeMatch[1]) {
                    finalMapUrl = iframeMatch[1];
                }

                // Sekarang kita izinkan URL dari domain mana saja (untuk mendukung embed pihak ketiga)
                // Selama URL tersebut valid dan memiliki protokol http/https
                if (finalMapUrl.startsWith('http')) {
                    mapIframe.src = finalMapUrl;
                    mapContainer.classList.remove('hidden');
                } else {
                    mapContainer.classList.add('hidden');
                }
            } else { 
                mapContainer.classList.add('hidden'); 
            }
        }
    </script>
</body>
</html>
